<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
html, body { width: 100vw; height: 100vh; overflow: hidden; cursor: crosshair; background: #000; }
#bg {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
  object-fit: fill;
  -webkit-user-drag: none;
  pointer-events: none;
}
#dim {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.35);
  pointer-events: none;
}
#selection {
  position: absolute;
  border: 2px solid #3b82f6;
  background: rgba(59,130,246,0.08);
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
  display: none;
  pointer-events: none;
}
#hint {
  position: fixed;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-family: -apple-system, sans-serif;
  pointer-events: none;
}
#size {
  position: absolute;
  background: #3b82f6;
  color: #fff;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-family: -apple-system, monospace;
  display: none;
  pointer-events: none;
  white-space: nowrap;
}
</style>
</head>
<body>
<img id="bg" />
<div id="dim"></div>
<div id="hint">拖拽框选翻译区域 · ESC 取消</div>
<div id="selection"></div>
<div id="size"></div>
<script src="selection.js"></script>
</body>
</html>
