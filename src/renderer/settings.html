<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Screen Translator Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 16px;
      background: #1e1e2e;
      color: #cdd6f4;
      overflow: hidden;
    }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    h1 { font-size: 17px; color: #cba6f7; }
    .lang-switch {
      font-size: 11px; color: #a6adc8; cursor: pointer;
      padding: 3px 8px; border: 1px solid #45475a; border-radius: 4px;
      background: #313244; user-select: none;
    }
    .lang-switch:hover { border-color: #cba6f7; color: #cdd6f4; }
    .row { display: flex; gap: 12px; margin-bottom: 8px; }
    .row .field { flex: 1; margin-bottom: 0; }
    .field { margin-bottom: 8px; }
    label { display: block; font-size: 12px; color: #a6adc8; margin-bottom: 3px; }
    input, select {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #45475a;
      border-radius: 5px;
      background: #313244;
      color: #cdd6f4;
      font-size: 13px;
      outline: none;
    }
    input:focus, select:focus { border-color: #cba6f7; }
    .provider-box {
      margin-top: 8px;
      padding: 12px 16px;
      background: #313244;
      border-radius: 6px;
    }
    #freeHint {
      padding: 40px 0;
      text-align: center;
    }
    .provider-box .field:last-child { margin-bottom: 0; }
    .provider-box .row { margin-bottom: 8px; }
    .provider-box .row .field { margin-bottom: 0; }
    .hint { font-size: 12px; color: #6c7086; text-align: center; }
    button {
      padding: 6px 14px;
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #b4befe; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Screen Translator</h1>
    <span class="lang-switch" id="langSwitch">中文</span>
  </div>

  <div class="row">
    <div class="field">
      <label data-i18n="hotkeyTranslate">Full Screen</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <input id="hotkey" type="text" readonly style="flex:1;cursor:pointer;min-width:0;" placeholder="shift+z+x" data-hotkey="hotkey">
        <button class="recordBtn" data-target="hotkey" data-i18n="record">Record</button>
      </div>
    </div>
    <div class="field">
      <label data-i18n="hotkeyRegion">Region</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <input id="regionKey" type="text" readonly style="flex:1;cursor:pointer;min-width:0;" placeholder="shift+z+c" data-hotkey="regionKey">
        <button class="recordBtn" data-target="regionKey" data-i18n="record">Record</button>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label data-i18n="hotkeyDismiss">Dismiss</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <input id="dismissKey" type="text" readonly style="flex:1;cursor:pointer;min-width:0;" placeholder="escape" data-hotkey="dismissKey">
        <button class="recordBtn" data-target="dismissKey" data-i18n="record">Record</button>
      </div>
    </div>
    <div class="field">
      <label data-i18n="hotkeyCache">Cache</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <input id="cacheKey" type="text" readonly style="flex:1;cursor:pointer;min-width:0;" placeholder="shift+s" data-hotkey="cacheKey">
        <button class="recordBtn" data-target="cacheKey" data-i18n="record">Record</button>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label data-i18n="targetLang">Target Language</label>
      <select id="targetLanguage">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
      </select>
    </div>
    <div class="field">
      <label data-i18n="provider">Provider</label>
      <select id="provider">
        <option value="google">Google Translate (Free)</option>
        <option value="openai">OpenAI Compatible</option>
        <option value="claude">Anthropic Compatible</option>
        <option value="deepl">DeepL</option>
        <option value="ollama">Ollama (Local)</option>
      </select>
    </div>
  </div>

  <!-- Unified provider config box -->
  <div class="provider-box">
    <div class="hint" id="freeHint" data-i18n="googleHint">Free, no API key required. Powered by Google Translate.</div>
    <div id="configFields" class="hidden">
      <div class="row" id="presetRow">
        <div class="field">
          <label data-i18n="preset">Preset</label>
          <select id="preset"></select>
        </div>
        <div class="field">
          <label data-i18n="model">Model</label>
          <input id="cfgModel" type="text" placeholder="">
        </div>
      </div>
      <div class="field" id="apiKeyRow">
        <label>API Key</label>
        <input id="cfgApiKey" type="password" placeholder="your-api-key">
      </div>
      <div class="field" id="baseUrlRow">
        <label>Base URL</label>
        <input id="cfgBaseUrl" type="text" placeholder="">
      </div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
